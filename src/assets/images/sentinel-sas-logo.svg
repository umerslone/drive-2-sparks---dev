<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Core Brand Gradient (Tech Blue to NGO Emerald) -->
    <linearGradient id="gradBrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" /> <!-- Cerulean -->
      <stop offset="50%" stop-color="#059669" /> <!-- Deep Emerald -->
      <stop offset="100%" stop-color="#10b981" /> <!-- Bright Emerald -->
    </linearGradient>
    
    <!-- Accent Gradient (Reverse Flow) -->
    <linearGradient id="gradAcc" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <!-- Center Energy Glow -->
    <radialGradient id="glowPulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#0284c7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ambient Glow Background -->
  <circle cx="256" cy="226" r="180" fill="url(#glowPulse)" />

  <!-- Outer Sentinel Hex-Shield (The Protector/Guardian Motif) -->
  <polygon points="256,40 440,110 440,310 256,420 72,310 72,110" fill="none" stroke="currentColor" stroke-width="2" stroke-opacity="0.1" />
  <polygon points="256,60 410,123 410,297 256,396 102,297 102,123" fill="none" stroke="url(#gradBrand)" stroke-width="4" stroke-opacity="0.8" stroke-linejoin="round" />

  <!-- The Hemispheres: Human vs Data -->
  
  <!-- Left Hemisphere: Organic, Flowing, Empathetic (Narrative & NGOs) -->
  <g filter="url(#glow)">
    <path d="M 256 120 C 170 100, 110 160, 125 240 C 135 285, 175 310, 200 340 C 225 365, 240 375, 256 380" fill="none" stroke="url(#gradBrand)" stroke-width="6" stroke-linecap="round" />
    <path d="M 256 160 C 200 145, 160 190, 165 245 C 170 280, 205 300, 220 325 C 235 345, 245 350, 256 355" fill="none" stroke="url(#gradBrand)" stroke-width="3" stroke-linecap="round" stroke-opacity="0.8"/>
  </g>

  <!-- Right Hemisphere: Geometric, Circuit, Structured (LogFrames & AI Pipelines) -->
  <polyline points="256,120 315,115 375,170 387,250 340,315 285,360 256,380" fill="none" stroke="url(#gradAcc)" stroke-width="6" stroke-linejoin="round" />
  <polyline points="256,160 300,155 345,195 352,255 315,305 275,335 256,355" fill="none" stroke="url(#gradAcc)" stroke-width="3" stroke-linejoin="round" stroke-opacity="0.8"/>

  <!-- AI Circuit Nodes (The processing units on the structured side) -->
  <circle cx="315" cy="115" r="5" fill="#34d399" />
  <circle cx="375" cy="170" r="6" fill="#0284c7" />
  <circle cx="387" cy="250" r="5" fill="#10b981" />
  <circle cx="340" cy="315" r="7" fill="#34d399" filter="url(#glow)" />
  <circle cx="285" cy="360" r="4" fill="#0284c7" />

  <!-- Organic Neural Synapses (The human connection on the organic side) -->
  <circle cx="200" cy="140" r="4" fill="#10b981" opacity="0.8" />
  <circle cx="140" cy="205" r="5" fill="#10b981" filter="url(#glow)" />
  <circle cx="155" cy="285" r="4" fill="#0ea5e9" opacity="0.9" />
  <circle cx="210" cy="330" r="4" fill="#10b981" />

  <!-- Central Core / AI Logic Eye (The Bridge between Organic and Digital) -->
  <circle cx="256" cy="250" r="26" fill="none" stroke="url(#gradBrand)" stroke-width="4" />
  <circle cx="256" cy="250" r="12" fill="#34d399" filter="url(#glow)" />
  <circle cx="256" cy="250" r="4" fill="#ffffff" />
  
  <!-- The Consensus Bridge (Connecting top to core to bottom) -->
  <line x1="256" y1="120" x2="256" y2="224" stroke="url(#gradBrand)" stroke-width="2" stroke-dasharray="4 4" opacity="0.7" />
  <line x1="256" y1="276" x2="256" y2="380" stroke="url(#gradBrand)" stroke-width="2" stroke-dasharray="4 4" opacity="0.7" />

  <!-- Typography -->
  <text x="256" y="455" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-size="26" font-weight="900" fill="currentColor" text-anchor="middle" letter-spacing="4">SENTINEL</text>
  <text x="256" y="482" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-size="13" font-weight="700" fill="#10b981" text-anchor="middle" letter-spacing="10">AI SUITE</text>
</svg>
