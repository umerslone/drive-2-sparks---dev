<!DOCTYPE html>
<html lang="en">
<!-- build: 2026-03-27T00 -->
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovusSparks AI</title>
    <link rel="icon" type="image/svg+xml" href="/src/assets/images/novussparks-icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-512.png" />
    <meta name="theme-color" content="#38BDF8" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NovusSparks" />
    <meta name="application-name" content="NovusSparks AI" />
    <meta name="description" content="Enterprise AI Platform — Idea generation, strategy, and business intelligence powered by AI." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--
      I2 (INFO): SRI (Subresource Integrity) is impractical for Google Fonts CSS.
      Google dynamically generates the CSS response based on the user-agent, so
      the content hash changes per browser/version making a fixed `integrity`
      attribute impossible. The risk is low: this is a stylesheet (not a script),
      loaded over HTTPS from a trusted CDN. To eliminate even this risk, consider
      self-hosting the font files in a future iteration.
    -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter&family=Lora&family=Source+Code+Pro&display=swap">
    <link href="/src/main.css" rel="stylesheet" />
    <style>
        #app-splash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0f1a 0%, #111827 50%, #0a0f1a 100%);
            transition: opacity 0.4s ease-out;
        }
        #app-splash.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        #app-splash img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 20px;
            animation: splash-pulse 1.8s ease-in-out infinite;
        }
        #app-splash .splash-title {
            font-family: 'Inter', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #38BDF8;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }
        #app-splash .splash-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: #6ee7a0;
            margin-bottom: 28px;
            opacity: 0.85;
        }
        #app-splash .splash-bar-track {
            width: 200px;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        #app-splash .splash-bar {
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, #38BDF8, #e5a932);
            border-radius: 2px;
            animation: splash-slide 1.2s ease-in-out infinite;
        }
        @keyframes splash-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.06); opacity: 0.85; }
        }
        @keyframes splash-slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }
    </style>
</head>

<body>
    <div id="app-splash">
        <img src="/src/assets/images/novussparks-icon.svg" alt="NovusSparks AI" />
        <div class="splash-title">NovusSparks AI</div>
        <div class="splash-subtitle">Enterprise AI Platform</div>
        <div class="splash-bar-track"><div class="splash-bar"></div></div>
    </div>
    <div id="root"></div>
    <script>
        // Independent splash safety net — runs even if module loading fails completely
        setTimeout(function() {
            var s = document.getElementById("app-splash");
            if (s) {
                console.warn("[splash] Safety timeout: removing splash after 4s");
                s.style.transition = "opacity 0.4s ease-out";
                s.style.opacity = "0";
                s.style.pointerEvents = "none";
                setTimeout(function() { if (s.parentNode) s.parentNode.removeChild(s); }, 500);
            }
        }, 4000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
